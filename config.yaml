# SHAR Project Configuration

project:
  name: "Suspicious Human Activity Recognition"
  version: "1.0.0"
  seed: 42

dataset:
  root: "data/raw"
  processed: "data/processed"
  num_classes: 21
  frames_per_video: 20
  img_size: 224
  classes_suspicious:
    - Abuse
    - Arrest
    - Arson
    - Assault
    - Burglary
    - Explosion
    - Fighting
    - RoadAccidents
    - Robbery
    - Shooting
    - Shoplifting
    - Stealing
    - Vandalism
  classes_normal:
    - Normal
    - Walking
    - WalkingUsingPhone
    - WalkingReadingBook
    - StandingStill
    - Sitting
    - MeetAndSplit
    - Clapping

training:
  batch_size: 16
  num_epochs: 30
  learning_rate: 0.0001
  weight_decay: 0.0001
  scheduler_step: 10
  scheduler_gamma: 0.1
  num_workers: 4
  device: "cuda"   # auto-falls back to cpu

model:
  backbone: "resnet50"   # phase3
  lstm_hidden: 256
  lstm_layers: 2
  dropout: 0.5
  save_dir: "models/saved"
  checkpoint_dir: "models/checkpoints"

webapp:
  confidence_threshold: 0.6
  alert_classes:
    - Abuse
    - Assault
    - Fighting
    - Shooting
    - Robbery
    - Arson
    - Explosion
